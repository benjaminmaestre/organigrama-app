  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asamblea Regional Medellín 4</title>

    <!-- Global Social Media Meta Tags -->
    <meta property="og:title" content="ORGANIGRAMA Asamblea Regional - Medellín 4" />
    <meta property="og:description" content="Asamblea Regional 2026 Felices Para Siempre" />
    <meta property="og:image" content="https://organigrama-ar2026.vercel.app/LogoAR.png?v=2" />
    <meta property="og:image:secure_url" content="https://organigrama-ar2026.vercel.app/LogoAR.png?v=2" />

    <meta property="og:image:height" content="630" />

    <link rel="apple-touch-icon" href="/LogoAR.png?v=2" />
    <link rel="image_src" href="https://organigrama-ar2026.vercel.app/LogoAR.png?v=2" />

    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme === 'light' || (!savedTheme && !systemPrefersDark)) {
          document.documentElement.classList.remove('dark');
        } else {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
